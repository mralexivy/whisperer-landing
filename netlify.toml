[build]
  command = "npm run build"
  publish = "build"
  ignore = "git diff --quiet $CACHED_COMMIT HEAD -- . ':!remotion'"

[[redirects]]
  from = "https://www.whispererapp.com/*"
  to = "https://whispererapp.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.whispererapp.com/*"
  to = "https://whispererapp.com/:splat"
  status = 301
  force = true

# Trailing slash redirect removed - was causing redirect loops
# Next.js handles this with trailingSlash: false in next.config.mjs

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; font-src 'self'; connect-src 'self'; frame-ancestors 'none'"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml"
